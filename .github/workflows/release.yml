name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: --win
          - os: macos-latest
            platform: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Svelte
        run: npm run build

      - name: Build and publish installers
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder ${{ matrix.platform }} --publish always
